[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "3dp-dds"
version = "0.1.0"
description = "Dense Deposition Simulator"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "meshio>=5.3",
    "numpy>=1.26",
    "scikit-image>=0.23",
    "scipy>=1.10",
    "trimesh>=4.0",
    "tyro>=0.8",
]

[project.optional-dependencies]
dev = ["pytest>=7.4"]

[tool.pytest.ini_options]
addopts = "-ra"
testpaths = ["tests"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
